<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Hauling & Grading — Proposal</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--red:#CC0000;--blk:#111;--gray:#666;--lgray:#f5f5f5;--bdr:#e0e0e0;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  body{font-family:var(--font);background:#f8f8f8;color:var(--blk);line-height:1.5;}
  .header{background:var(--blk);padding:16px 24px;display:flex;align-items:center;gap:12px;}
  .header img{height:36px;}
  .header span{color:#fff;font-size:14px;font-weight:600;letter-spacing:1px;}
  .container{max-width:800px;margin:24px auto;padding:0 16px;}
  .card{background:#fff;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:20px;}
  .card-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);font-size:14px;font-weight:600;color:var(--blk);}
  .card-body{padding:20px;}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .meta-label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
  .meta-value{font-size:14px;color:var(--blk);margin-top:2px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;padding:10px 12px;background:var(--lgray);font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr);}
  tbody td{padding:10px 12px;border-bottom:1px solid var(--bdr);}
  .text-right{text-align:right;}
  .total-row td{font-weight:700;font-size:15px;background:var(--lgray);border-top:2px solid var(--bdr);}
  .section-title{font-size:13px;font-weight:600;color:var(--blk);padding:10px 12px;background:rgba(204,0,0,.04);border-bottom:1px solid var(--bdr);}
  .notes-box{background:var(--lgray);border-radius:8px;padding:14px 16px;font-size:13px;color:var(--gray);white-space:pre-wrap;}
  .approve-section{text-align:center;padding:32px 20px;}
  .approve-section h3{font-size:18px;margin-bottom:4px;}
  .approve-section p{font-size:13px;color:var(--gray);margin-bottom:20px;}
  .approve-form{max-width:400px;margin:0 auto;text-align:left;}
  .approve-form label{display:block;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;margin-top:12px;}
  .approve-form input,.approve-form textarea{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:14px;font-family:var(--font);}
  .approve-form textarea{min-height:60px;resize:vertical;}
  .btn-approve{display:inline-block;margin-top:20px;padding:12px 32px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s;}
  .btn-approve:hover{opacity:.9;}
  .btn-approve:disabled{opacity:.5;cursor:not-allowed;}
  .approved-badge{display:inline-flex;align-items:center;gap:8px;background:#e8f5e9;color:#2e7d32;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:600;margin-top:12px;}
  .err{color:var(--red);font-size:12px;margin-top:8px;}
  .loading{text-align:center;padding:80px 20px;color:var(--gray);}
  .not-found{text-align:center;padding:80px 20px;}
  .not-found h2{font-size:20px;margin-bottom:8px;}
  .not-found p{color:var(--gray);}
  .desc-cell{font-size:11px;color:var(--gray);margin-top:2px;}
  @media(max-width:600px){.meta-grid{grid-template-columns:1fr;}.container{padding:0 10px;margin:12px auto;}}
</style>
</head>
<body>
<div class="header">
  <img src="/hd_logo_cropped.png" alt="HD" onerror="this.style.display='none'"/>
  <span>HD HAULING &amp; GRADING</span>
</div>
<div class="container" id="main">
  <div class="loading" id="loading-state">Loading proposal...</div>
</div>

<script>
(function(){
  var token = window.location.pathname.split('/').pop();
  var main = document.getElementById('main');

  fetch('/proposal/view/' + token)
    .then(function(r){ return r.json(); })
    .then(function(d){
      document.getElementById('loading-state').style.display = 'none';
      if (!d.ok || !d.proposal) {
        main.innerHTML = '<div class="not-found"><h2>Proposal Not Found</h2><p>This link may have expired or is invalid.</p></div>';
        return;
      }
      renderProposal(d.proposal);
    })
    .catch(function(){
      document.getElementById('loading-state').style.display = 'none';
      main.innerHTML = '<div class="not-found"><h2>Error</h2><p>Could not load proposal. Please try again later.</p></div>';
    });

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmt(n){ return '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function renderProposal(prop){
    var snap = typeof prop.snap === 'string' ? JSON.parse(prop.snap) : (prop.snap || {});
    var name = snap.project_name || snap.name || prop.name || 'Proposal';
    var client = snap.client || prop.client || '';
    var date = snap.date || prop.created_at || '';
    if(date && date.length > 10) date = new Date(date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    var address = snap.address || '';
    if(snap.city_state) address = address ? (address + ', ' + snap.city_state) : snap.city_state;

    var html = '';

    // Project info card
    html += '<div class="card"><div class="card-hdr">' + esc(name) + '</div><div class="card-body"><div class="meta-grid">';
    if(client) html += '<div><div class="meta-label">Client</div><div class="meta-value">' + esc(client) + '</div></div>';
    if(date) html += '<div><div class="meta-label">Date</div><div class="meta-value">' + esc(date) + '</div></div>';
    if(address) html += '<div><div class="meta-label">Address</div><div class="meta-value">' + esc(address) + '</div></div>';
    if(snap.project_number) html += '<div><div class="meta-label">Project #</div><div class="meta-value">' + esc(snap.project_number) + '</div></div>';
    html += '</div></div></div>';

    // Line items
    var sections = snap.sections || [];
    var concItems = snap.concItems || [];
    var extraItems = snap.extraItems || [];
    var grandTotal = 0;

    if(sections.length || concItems.length || extraItems.length){
      html += '<div class="card"><div class="card-hdr">Bid Items</div>';

      // Pavement sections
      sections.forEach(function(sec){
        html += '<div class="section-title">' + esc(sec.name || 'Pavement Section') + '</div>';
        html += '<table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th class="text-right">Rate</th><th class="text-right">Amount</th></tr></thead><tbody>';
        (sec.layers || []).forEach(function(lyr){
          var amt = (lyr.qty||0) * (lyr.rate||lyr.bid_rate||0);
          grandTotal += amt;
          html += '<tr><td>' + esc(lyr.material||lyr.name||'') + (lyr.desc?'<div class="desc-cell">'+esc(lyr.desc)+'</div>':'') + '</td>';
          html += '<td>' + (lyr.qty||'') + '</td><td>' + esc(lyr.unit||'TON') + '</td>';
          html += '<td class="text-right">' + fmt(lyr.rate||lyr.bid_rate||0) + '</td>';
          html += '<td class="text-right">' + fmt(amt) + '</td></tr>';
        });
        html += '</tbody></table>';
      });

      // Concrete items
      if(concItems.length){
        html += '<div class="section-title">Concrete</div>';
        html += '<table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th class="text-right">Rate</th><th class="text-right">Amount</th></tr></thead><tbody>';
        concItems.forEach(function(c){
          var amt = (c.qty||0) * (c.price||c.rate||0);
          grandTotal += amt;
          html += '<tr><td>' + esc(c.name||'') + (c.desc?'<div class="desc-cell">'+esc(c.desc)+'</div>':'') + '</td>';
          html += '<td>' + (c.qty||'') + '</td><td>' + esc(c.unit||'LF') + '</td>';
          html += '<td class="text-right">' + fmt(c.price||c.rate||0) + '</td>';
          html += '<td class="text-right">' + fmt(amt) + '</td></tr>';
        });
        html += '</tbody></table>';
      }

      // Extra items
      if(extraItems.length){
        html += '<div class="section-title">Additional Items</div>';
        html += '<table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th class="text-right">Rate</th><th class="text-right">Amount</th></tr></thead><tbody>';
        extraItems.forEach(function(e){
          var amt = e.subtotal || ((e.qty||0) * (e.price||0));
          grandTotal += amt;
          html += '<tr><td>' + esc(e.name||'') + (e.desc?'<div class="desc-cell">'+esc(e.desc)+'</div>':'') + '</td>';
          html += '<td>' + (e.qty||'') + '</td><td>' + esc(e.unit||'EA') + '</td>';
          html += '<td class="text-right">' + fmt(e.price||0) + '</td>';
          html += '<td class="text-right">' + fmt(amt) + '</td></tr>';
        });
        html += '</tbody></table>';
      }

      // Use snap total if available, otherwise calculated
      var total = snap.total || prop.total || grandTotal;
      html += '<table><tbody><tr class="total-row"><td colspan="4" class="text-right">Total</td><td class="text-right">' + fmt(total) + '</td></tr></tbody></table>';
      html += '</div>';
    }

    // Notes
    if(snap.notes){
      html += '<div class="card"><div class="card-hdr">Terms &amp; Conditions</div><div class="card-body"><div class="notes-box">' + esc(snap.notes) + '</div></div></div>';
    }

    // Approval section
    if(snap.approved_by){
      html += '<div class="card"><div class="card-body approve-section">';
      html += '<div class="approved-badge"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Approved by ' + esc(snap.approved_by) + '</div>';
      if(snap.approved_at) html += '<p style="margin-top:8px;font-size:12px;color:var(--gray);">' + new Date(snap.approved_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric',hour:'numeric',minute:'2-digit'}) + '</p>';
      if(snap.approval_comment) html += '<p style="margin-top:6px;font-size:13px;color:var(--gray);font-style:italic;">"' + esc(snap.approval_comment) + '"</p>';
      html += '</div></div>';
    } else {
      html += '<div class="card"><div class="card-body approve-section">';
      html += '<h3>Approve This Proposal</h3>';
      html += '<p>Review the items above. When ready, enter your name below to approve.</p>';
      html += '<div class="approve-form">';
      html += '<label>Your Name *</label><input type="text" id="approver-name" placeholder="e.g. John Smith"/>';
      html += '<label>Comment (optional)</label><textarea id="approver-comment" placeholder="Any notes or questions..."></textarea>';
      html += '<div id="approve-err" class="err"></div>';
      html += '<button class="btn-approve" id="btn-approve" onclick="submitApproval()">Approve Proposal</button>';
      html += '</div></div></div>';
    }

    main.innerHTML = html;
  }

  window.submitApproval = function(){
    var name = document.getElementById('approver-name').value.trim();
    var comment = document.getElementById('approver-comment').value.trim();
    var errEl = document.getElementById('approve-err');
    var btn = document.getElementById('btn-approve');
    errEl.textContent = '';
    if(!name){ errEl.textContent = 'Please enter your name.'; return; }
    btn.disabled = true;
    btn.textContent = 'Submitting...';
    fetch('/proposal/approve/' + token, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name, comment: comment})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.ok){
        var section = document.querySelector('.approve-section');
        section.innerHTML = '<div class="approved-badge"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Approved by ' + esc(name) + '</div><p style="margin-top:12px;font-size:13px;color:var(--gray);">Thank you! The team has been notified.</p>';
      } else {
        errEl.textContent = d.error || 'Failed to approve. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Approve Proposal';
      }
    })
    .catch(function(){
      errEl.textContent = 'Network error. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Approve Proposal';
    });
  };
})();
</script>
</body>
</html>
